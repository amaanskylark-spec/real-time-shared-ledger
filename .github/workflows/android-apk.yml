name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Fix Kotlin duplicate class issue
        run: |
          cat >> android/gradle.properties << 'EOF'
          kotlin.stdlib.default.dependency=false
          EOF

      - name: Add Kotlin resolution strategy to app build.gradle
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.25"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.25"
                  force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.25"
              }
          }
          EOF

      - name: Grant gradle execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: money-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk